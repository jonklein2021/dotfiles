set -g @prefix_symbol '⌨'

set-window-option -g visual-bell on
set-option -g status-style "bg=#{@color1} fg=#{@color3}"

set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#{@color5},fg=#{@color2},bold] 🀢 #S #[bg=#{@color9},fg=#{@color5}] #[bg=#{@color9},fg=#{@color4},none]#h #[bg=#{@color1},fg=#{@color9}] "
set -g status-right "#{?client_prefix,#{@prefix_symbol} ,} #{cpu_fg_color}CPU: #{cpu_percentage} #[fg=#{@color3}] #{battery_color_fg}#[bg=#{@color1}]#{battery_icon} #{battery_percentage}#[fg=#{@color3}]  %b %d  %I:%M %p "

set -g window-status-separator " "

set -g window-status-format "#[bg=#{@color8},fg=#{@color2}] #I #W#{?window_bell_flag,!,} "
set -g window-status-style "none"

set -g window-status-current-format "#[bg=#{@color7},fg=#{@color2}] #I #W#{?window_bell_flag,!,} "
set -g window-status-current-style "bold"

set -g clock-mode-style "12"

### Keybinds ###

# Add Ctrl+s as a secondary prefix
set -g prefix2 C-s
bind-key C-s send-prefix -2

# Vim binds for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode keybinds
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi C-q send-keys -X rectangle-toggle

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Open new panes in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind \" split-window -v -c "#{pane_current_path}"

# <Prefix + Q>: kill current session and reenter another existing session
bind Q confirm-before -p "kill-session #S? (y/n)" \
	{ run-shell "next=\$(tmux list-sessions | grep -v '#S' | sed -E 's/:.*$//' | head -n 1); tmux switch-client -t \"\$next\" && tmux kill-session -t '#S'" }

# <Prefix + s>: improved session list
bind s display-popup -b rounded -T "Session List" -E "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

# <Prefix + n>: new session popup
bind n display-popup -b rounded -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

# <Prefix + ?>: improved keybind display
bind ? display-popup -b rounded -E 'tmux list-keys | fzf --reverse --ansi | cut -f 2 | xargs -I % tmux display-message "%"'

### TPM & Plugins ###

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.config/tmux/plugins/tpm/tpm'

