### Options ###

# because MacOS
set-environment -g PATH "/bin:/usr/bin:/usr/sbin:/usr/local/bin:/opt/homebrew/bin:/opt/nvim/bin"

# use zsh as shell
set -g default-command 'zsh'

# better colors
set -g default-terminal 'xterm-256color'

# use Vi keys in copy mode (Prefix + [)
set -g mode-keys vi

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# i like the scroll
set -g mouse 'on'

# needed for Yazi"s image preview to work properly
# ref: https://yazi-rs.github.io/docs/image-preview#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# 1-index panes and windows
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Automatically restore the last saved environment when tmux starts up
set -g @continuum-restore 'on'

### Styles ###

set -g @color1 "#1c1b19"    # black
set -g @color2 "#333333"    # gray
set -g @color3 "#8a8a8a"    # light gray
set -g @color4 "#e4e4e4"    # white
set -g @color5 "#ffaf36"    # orange
set -g @color6 "#5fff00"    # green
set -g @color7 "#00afff"    # light blue
set -g @color8 "#0090d4"    # darker blue
set -g @color9 "#8e46c2"    # purple

